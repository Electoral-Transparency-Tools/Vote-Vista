name: Monthly data refresh

# Runs the MyNeta scrape + existing seed scripts to refresh the candidate
# data in the Neon Postgres DB once a month. Can also be triggered manually
# from the Actions tab (Run workflow) for ad-hoc refreshes or to test
# changes to the scraper.

on:
  schedule:
    # 03:00 UTC on the 1st of every month (~08:30 IST).
    - cron: "0 3 1 * *"
  workflow_dispatch:
    inputs:
      ac_limit:
        description: "Scrape only the first N ACs (leave empty for all). Useful for smoke tests."
        required: false
        default: ""

permissions:
  contents: read

jobs:
  refresh:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    concurrency:
      group: monthly-refresh
      cancel-in-progress: false

    env:
      DATABASE_URL: ${{ secrets.DATABASE_URL }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Smoke-test scrape (manual run with ac_limit)
        if: ${{ github.event_name == 'workflow_dispatch' && inputs.ac_limit != '' }}
        # Scrape only; does NOT touch the DB. Safe to run before DATABASE_URL
        # is configured, useful for validating the workflow + scraper end-to-end.
        run: node scripts/scrape-myneta.mjs --limit=${{ inputs.ac_limit }} --output=data/bangalore_candidates.json

      - name: Verify DATABASE_URL is set
        if: ${{ github.event_name != 'workflow_dispatch' || inputs.ac_limit == '' }}
        run: |
          if [ -z "${DATABASE_URL}" ]; then
            echo "::error::DATABASE_URL repo secret is not set. Add it via 'gh secret set DATABASE_URL' or the repo settings."
            exit 1
          fi
          echo "DATABASE_URL is configured (length: ${#DATABASE_URL})"

      - name: Monthly refresh (scheduled / full manual run)
        if: ${{ github.event_name != 'workflow_dispatch' || inputs.ac_limit == '' }}
        run: node scripts/monthly-refresh.mjs

      - name: Upload scraped candidate JSON
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: bangalore_candidates-${{ github.run_id }}
          path: data/bangalore_candidates.json
          if-no-files-found: warn
          retention-days: 30
